# tmux window layout for the jailed-agents devShell.
#
# This is native tmux syntax (see `man tmux`), sourced into the freshly created
# Sourced at devShell creating during `nix develop`.

rename-window kaimon
send-keys -t kaimon "jailed-kaimon" Enter

new-window -c "#{@proj}" -n claude
send-keys -t claude "jailed-claude" Enter

# new window in @proj directory, named shell.
new-window -c "#{@proj}" -n shell
send-keys -t shell "jailed-shell" Enter

new-window -c "#{@proj}" -n repl
send-keys -t repl "jailed-julia-repl" Enter

select-window -t claude
